minimum_pre_commit_version: "3.0.0"
default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: local
    hooks:
      - id: lint-fix
        name: Quality autofix (fmt + lint checks)
        entry: make lint:fix
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: full-test-matrix
        name: Full test matrix
        entry: make test
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
