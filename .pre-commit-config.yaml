minimum_pre_commit_version: "3.0.0"
default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: local
    hooks:
      - id: lint-fix
        name: Quality autofix (fmt + lint checks)
        entry: make lint:fix
        language: system
        pass_filenames: false
        stages: [pre-commit]
        # Only run when source files change (mirrors CI dorny/paths-filter).
        files: >-
          (?x)^(
            .*\.rs|
            .*\.py|
            .*\.ts|
            .*\.js|
            .*\.c|
            .*\.h|
            .*\.go|
            .*/Cargo\.toml|
            Cargo\.lock|
            sdks/python/pyproject\.toml|
            sdks/node/package\.json|
            make/quality\.mk|
            \.pre-commit-config\.yaml
          )$

      - id: full-test-matrix
        name: Smart test matrix (changed components only)
        entry: make test
        language: system
        pass_filenames: false
        verbose: true
        stages: [pre-push]
        # Only run when source/test files change (mirrors CI dorny/paths-filter).
        files: >-
          (?x)^(
            src/boxlite/|
            src/shared/|
            src/cli/|
            src/ffi/|
            src/guest/|
            sdks/|
            .*/Cargo\.toml$|
            Cargo\.lock$
          )
